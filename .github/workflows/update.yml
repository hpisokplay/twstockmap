name: 每日盤後資料更新

on:
  schedule:
    # UTC 09:30 = 台北 17:30（收盤後、法人資料公布後），週一到週五
    - cron: "30 9 * * 1-5"
    # UTC 13:00 = 台北 21:00 補跑一次（保險，避免資料延遲公布）
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}   # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 抓取盤後資料
        run: python3 scripts/fetch_data.py

      - name: 提交更新
        run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "無變更" || git commit -m "data: $(date +'%Y-%m-%d') 盤後更新"
          git push
