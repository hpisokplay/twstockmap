<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>台股產業地圖</title>
<meta name="description" content="台股產業鏈地圖與個股盤後資料，每日自動更新。">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#0b1220; --bg2:#101a2e; --card:#141f36; --card2:#1a2745;
  --line:#233250; --txt:#e6edf7; --sub:#8fa3c0; --dim:#5c6f8f;
  --accent:#5aa2ff; --accent2:#9d7bff;
  --up:#ff5a6a; --dn:#2ecc8f; --flat:#8fa3c0;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--txt);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;line-height:1.55;min-height:100vh}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit}

/* header */
header{position:sticky;top:0;z-index:50;background:rgba(11,18,32,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hwrap{max-width:1180px;margin:0 auto;padding:0 16px}
.brand{display:flex;align-items:center;gap:10px;padding:12px 0 8px}
.brand h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px}
.brand .upd{margin-left:auto;font-size:11px;color:var(--dim)}
nav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding-bottom:0}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;color:var(--sub);font-size:14px;padding:9px 14px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
nav button.on{color:var(--txt);border-bottom-color:var(--accent);font-weight:600}

main{max-width:1180px;margin:0 auto;padding:18px 16px 90px}
.banner{background:linear-gradient(135deg,#16223f,#1c1a3a);border:1px solid var(--line);border-radius:var(--radius);padding:10px 14px;font-size:12.5px;color:var(--sub);margin-bottom:16px}
h2.pagetitle{font-size:22px;font-weight:700;margin:6px 0 4px}
.pagesub{color:var(--sub);font-size:13px;margin-bottom:16px}

/* 漲幅焦點 */
.focus{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:22px}
.focus .fc{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;cursor:pointer;border-top:3px solid var(--flat)}
.fc .rank{font-size:11px;color:var(--dim)}
.fc .pct{font-size:20px;font-weight:700;margin:2px 0}
.fc .nm{font-size:13px;color:var(--sub)}
.up{color:var(--up)} .dn{color:var(--dn)} .flat{color:var(--flat)}

/* 題材卡片 */
.catbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.catbar button{background:var(--card);border:1px solid var(--line);color:var(--sub);border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer}
.catbar button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:transform .12s,border-color .12s;display:flex;flex-direction:column;gap:8px}
.tcard:hover{transform:translateY(-2px);border-color:var(--accent)}
.tcard .top{display:flex;align-items:center;gap:8px}
.tcard .icon{font-size:20px}
.tcard .cat{font-size:11px;color:var(--accent);border:1px solid var(--line);border-radius:10px;padding:1px 8px}
.tcard .cnt{margin-left:auto;font-size:11px;color:var(--dim)}
.tcard h3{font-size:16.5px}
.tcard p{font-size:12.5px;color:var(--sub);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tcard .avg{font-size:12px}

/* 產業地圖 */
.tier{margin-bottom:22px}
.tier>.tname{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;margin-bottom:10px}
.tier>.tname .badge{font-size:11px;padding:2px 10px;border-radius:10px;color:#fff}
.b-up{background:#4a6fd8}.b-mid{background:#7c5bd6}.b-dn{background:#3f8f7a}
.group{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.group .gname{font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;min-width:128px}
.chip:hover{border-color:var(--accent)}
.chip .l1{display:flex;gap:6px;align-items:baseline}
.chip .nm{font-size:13.5px;font-weight:600}
.chip .cd{font-size:11px;color:var(--dim)}
.chip .l2{display:flex;gap:8px;font-size:12px;margin-top:2px}
.chip .note{font-size:10.5px;color:var(--dim);margin-top:2px}
.arrowline{text-align:center;color:var(--dim);font-size:18px;margin:2px 0 14px}

/* 公司資料庫 */
.dbwrap{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
@media(max-width:820px){.dbwrap{grid-template-columns:1fr}}
.list{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;position:sticky;top:66px}
@media(max-width:820px){.list{position:static}}
.list .lhd{display:flex;align-items:baseline;justify-content:space-between;padding:12px 12px 0}
.list .lhd .t{font-size:13.5px;font-weight:700}
.list .lhd .c{font-size:11px;color:var(--dim)}
.list .sortbar{display:flex;gap:6px;padding:8px 10px 0}
.list .sortbar button{background:var(--bg2);border:1px solid var(--line);color:var(--sub);border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer}
.list .sortbar button.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.list .search{padding:10px}
.list input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:8px 12px;font-size:14px;outline:none}
.list .rows{max-height:64vh;overflow-y:auto}
.lrow{display:flex;align-items:center;gap:8px;padding:9px 12px 9px 10px;cursor:pointer;border-top:1px solid var(--line);font-size:13.5px;border-left:3px solid transparent}
.lrow:hover{background:var(--card2)}
.lrow.on{background:var(--card2);border-left-color:var(--accent)}
.lrow.up{border-left-color:rgba(255,90,106,.5)}
.lrow.dn{border-left-color:rgba(46,204,143,.5)}
.lrow .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:108px}
.lrow .cd{color:var(--dim);font-size:12px;flex-shrink:0}
.lrow .px{margin-left:auto;font-size:12.5px;text-align:right;flex-shrink:0}

/* 個股頁 */
.stock{padding:0}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.kv{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;position:relative}
.kv .k{font-size:11px;color:var(--dim)}
.kv .v{font-size:16px;font-weight:600;margin-top:2px}
.kv .v.small{font-size:12.5px;font-weight:500}
.kv .ico{position:absolute;top:9px;right:10px;font-size:12px;opacity:.45}
.sec{font-size:14px;font-weight:700;margin:16px 0 8px;color:var(--sub)}
.empty{color:var(--dim);text-align:center;padding:60px 0}

/* 個股：頂部資訊卡 */
.sbanner{background:linear-gradient(135deg,#16223f,#1c1a3a);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden}
.sbanner::after{content:'';position:absolute;right:-40px;top:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(90,162,255,.14),transparent 70%)}
.sbanner .row1{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;position:relative}
.sbanner .avatar{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.sbanner .nmwrap{flex:1;min-width:170px}
.sbanner h3{font-size:21px;font-weight:800;display:inline}
.sbanner .cd{color:var(--dim);font-size:12.5px;margin-left:6px}
.sbanner .mkt{font-size:10.5px;color:var(--sub);border:1px solid var(--line);border-radius:8px;padding:1px 8px;margin-left:6px;vertical-align:middle}
.sbanner .industry{font-size:11.5px;color:var(--dim);margin-top:4px}
.sbanner .pricewrap{text-align:right}
.sbanner .px{font-size:28px;font-weight:800;line-height:1.1}
.sbanner .chgpill{display:inline-block;font-size:12.5px;font-weight:700;padding:2px 11px;border-radius:20px;margin-top:5px}
.chgpill.up{background:rgba(255,90,106,.16);color:var(--up)}
.chgpill.dn{background:rgba(46,204,143,.16);color:var(--dn)}
.chgpill.flat{background:rgba(143,163,192,.14);color:var(--flat)}
.sbanner .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.themetag{font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:10px;padding:3px 11px;color:var(--sub);cursor:pointer}
.themetag:hover{border-color:var(--accent);color:var(--accent)}
.rangebar{margin-top:14px;max-width:420px}
.rangebar .rlbl{display:flex;justify-content:space-between;font-size:10.5px;color:var(--dim);margin-bottom:4px}
.rangebar .track{position:relative;height:6px;background:var(--bg2);border-radius:3px}
.rangebar .fill{position:absolute;top:0;left:0;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--dn),var(--up))}
.rangebar .now{position:absolute;top:-4px;width:2px;height:14px;background:#fff;border-radius:1px;box-shadow:0 0 4px rgba(255,255,255,.6)}

.infocard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.infocard:last-child{margin-bottom:0}
.netbars{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.netbars .nrow{display:flex;align-items:center;gap:10px;font-size:12.5px}
.netbars .nrow .k{width:76px;color:var(--sub);flex-shrink:0}
.netbars .nrow .track{flex:1;height:7px;background:var(--bg2);border-radius:4px;position:relative;overflow:visible}
.netbars .nrow .track .mid{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--line)}
.netbars .nrow .fill{position:absolute;top:0;height:100%;border-radius:4px}
.netbars .nrow .val{width:78px;text-align:right;font-weight:600;flex-shrink:0}
.back{background:none;border:1px solid var(--line);color:var(--sub);border-radius:9px;padding:6px 14px;cursor:pointer;margin-bottom:12px;font-size:13px}
footer{border-top:1px solid var(--line);color:var(--dim);font-size:11.5px;text-align:center;padding:20px 16px 30px;max-width:1180px;margin:0 auto}

/* 每日焦點 */
.idxgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.idx{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.idx .n{font-size:12.5px;color:var(--sub)}
.idx .v{font-size:20px;font-weight:700;margin:2px 0}
.idx .d{font-size:12.5px}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.cols2{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.panel h4{font-size:14.5px;margin-bottom:10px}
.rrow{display:flex;align-items:center;gap:8px;padding:7px 4px;border-top:1px solid var(--line);font-size:13.5px;cursor:pointer}
.rrow:hover{background:var(--card2)}
.rrow .i{width:20px;color:var(--dim);font-size:12px}
.rrow .cd{color:var(--dim);font-size:12px}
.rrow .r{margin-left:auto;font-weight:600}

/* 產業總覽表格 */
table.ov{width:100%;border-collapse:collapse;font-size:13.5px}
table.ov th{font-size:12px;color:var(--dim);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap}
table.ov td{padding:9px 10px;border-bottom:1px solid var(--line)}
table.ov tr.body:hover{background:var(--card2);cursor:pointer}
.dist{display:inline-flex;height:8px;border-radius:4px;overflow:hidden;width:90px;vertical-align:middle}
.dist span{height:100%}

/* 熱力圖 */
#tm{position:relative;width:100%;height:560px;border-radius:var(--radius);overflow:hidden}
@media(max-width:760px){#tm{height:70vh}}
.tmc{position:absolute;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow:hidden;cursor:pointer;border:1px solid rgba(11,18,32,.65);padding:2px}
.tmc .tn{font-size:12.5px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.45);line-height:1.25}
.tmc .tp{font-size:11.5px;color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(0,0,0,.45)}
.tmc:hover{filter:brightness(1.15)}
.legend{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:10px;font-size:11px;color:var(--dim)}
.legend i{width:26px;height:10px;border-radius:2px;display:inline-block}

/* 評分排行 */
.scorecard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer}
.scorecard:hover{border-color:var(--accent)}
.scorecard .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.scorecard .medal{font-size:18px}
.scorecard .nm{font-weight:700;font-size:15.5px}
.scorecard .total{margin-left:auto;font-size:26px;font-weight:800}
.sbars{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px 18px;margin-top:8px}
.sbar{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--sub)}
.sbar .k{width:44px;white-space:nowrap}
.sbar .track{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;display:block}
.sbar .fill{height:100%;border-radius:4px;display:block}
.sbar .val{width:26px;text-align:right;color:var(--txt)}
.segbar{display:flex;gap:8px;margin-bottom:14px}
.segbar button{background:var(--card);border:1px solid var(--line);color:var(--sub);border-radius:10px;padding:6px 16px;font-size:13.5px;cursor:pointer}
.segbar button.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* 創作者 */
.crcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;gap:12px;margin-bottom:12px}
.crcard .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.crcard .h{font-size:12px;color:var(--dim)}
.crcard .d{font-size:12.5px;color:var(--sub);margin:4px 0 6px}
.crcard .links a{font-size:12px;margin-right:12px}

/* 產業焦點新聞 */
.newsblock{margin-bottom:24px}
.newstoggle{display:inline-flex;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.newstoggle button{background:none;border:none;color:var(--sub);font-size:13.5px;padding:7px 16px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.newstoggle button.on{background:var(--accent);color:#fff;font-weight:600}
.newshd{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.newshd .nico{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.newshd .htxt .t{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700}
.newshd .htxt .b{font-size:10.5px;color:var(--accent);border:1px solid var(--line);border-radius:9px;padding:1px 8px;font-weight:500}
.newshd .htxt .s{font-size:11.5px;color:var(--sub);margin-top:3px}
.newshd .ndates{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
.newshd .ndates button{background:var(--card);border:1px solid var(--line);color:var(--sub);border-radius:8px;padding:4px 10px;font-size:11.5px;cursor:pointer}
.newshd .ndates button.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.newsrow{display:flex;gap:14px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:thin}
.newsrow::-webkit-scrollbar{height:8px}
.newsrow::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.ncard{position:relative;flex:0 0 300px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:8px;min-height:214px}
.ncard .nc1{display:flex;align-items:center;gap:8px}
.ncard .src{font-size:11px;color:var(--accent);background:rgba(90,162,255,.12);border-radius:7px;padding:2px 8px}
.ncard .nd{margin-left:auto;font-size:11px;color:var(--dim)}
.ncard h4{font-size:15px;font-weight:700;line-height:1.4}
.ncard p{font-size:12.5px;color:var(--sub);flex:1;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.ncard .ntags{display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:10px}
.ncard .ntag{font-size:11px;color:var(--sub);border:1px solid var(--line);border-radius:9px;padding:3px 9px;cursor:pointer}
.ncard .ntag:hover{border-color:var(--accent);color:var(--accent)}
.ncard.lock .nc1,.ncard.lock h4,.ncard.lock p,.ncard.lock .ntags{filter:blur(5px);opacity:.5;user-select:none}
.premium{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;padding:16px;background:linear-gradient(180deg,rgba(20,31,54,.55),rgba(20,31,54,.85));border-radius:var(--radius)}
.premium .plock{width:40px;height:40px;border-radius:50%;background:var(--card2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px}
.premium .pt{font-size:14px;font-weight:700}
.premium .pd{font-size:11.5px;color:var(--sub);max-width:220px;line-height:1.5}
.premium .pcta{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:600;font-size:12.5px;border-radius:9px;padding:7px 20px;cursor:pointer}
.premium .pcta:hover{filter:brightness(1.1)}
.newsnote{font-size:11.5px;color:var(--dim);margin-top:2px}
.commentbox{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.commentbox h4{font-size:14.5px;margin-bottom:6px}
.commentbox p{font-size:13px;color:var(--sub)}

/* ---------- 題材總覽：Hero ---------- */
.hero{text-align:center;padding:22px 10px 26px}
.hero h1.htitle{font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.5px}
.hero .htag{color:var(--sub);font-size:13px;margin-top:6px}
.focushd{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.focushd .ft{font-size:13px;color:var(--sub);display:flex;align-items:center;gap:6px}
.focushd .fseg{margin-left:auto;display:inline-flex;gap:4px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:3px}
.focushd .fseg button{background:none;border:none;color:var(--sub);font-size:12px;padding:4px 12px;border-radius:7px;cursor:pointer}
.focushd .fseg button.on{background:var(--accent);color:#fff;font-weight:600}
.focus .fc{border-top-width:3px;position:relative;overflow:hidden}
.focus .fc::after{content:'';position:absolute;right:-20px;top:-20px;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%)}

/* 題材卡片（豐富版） */
.tcard{position:relative;padding:0;overflow:hidden}
.tcard .thead{padding:14px 16px 10px;background:linear-gradient(135deg,rgba(90,162,255,.16),rgba(157,123,255,.10))}
.tcard .top{padding:0}
.tcard .body{padding:2px 16px 16px}
.tcard .cnt{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:20px;padding:2px 10px;font-size:10.5px;font-weight:600}
.tcard .icowrap{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:18px}
.tcard .updated{font-size:10.5px;color:var(--dim);margin-top:8px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:8px}

/* ---------- 主題詳情 banner ---------- */
.tbanner{background:linear-gradient(135deg,#1a1030,#0f1a33 60%);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px}
.tbanner .row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tbanner .bico{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:22px}
.tbanner h2{font-size:24px;font-weight:800}
.tbanner .desc{color:var(--sub);font-size:13px;line-height:1.7;margin-top:10px;max-width:920px}
.tbanner .stats{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tbanner .stat{font-size:11.5px;color:var(--accent);background:rgba(90,162,255,.12);border-radius:9px;padding:4px 12px}
.subtabs{display:inline-flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:18px}
.subtabs button{background:none;border:none;color:var(--sub);font-size:13.5px;padding:8px 18px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.subtabs button.on{background:var(--accent);color:#fff;font-weight:600}

/* 產業關鍵指標卡 */
.metgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:20px}
.metcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.metcard .mk{font-size:11px;color:var(--dim);margin-bottom:4px}
.metcard .mv{font-size:17px;font-weight:700}

/* 主題熱力圖 */
.sechd{display:flex;align-items:center;gap:8px;margin:22px 0 10px}
.sechd .bar{width:4px;height:16px;border-radius:2px;background:var(--accent)}
.sechd h4{font-size:15px;font-weight:700}
.sechd .sub{font-size:11.5px;color:var(--dim);margin-left:4px}
.sechd .segbar{margin:0 0 0 auto}
#tm-theme{position:relative;width:100%;height:320px;border-radius:var(--radius);overflow:hidden;margin-bottom:10px}

/* 籌碼訊號 */
.chipsig{display:flex;flex-direction:column;gap:10px}
.chipsig .row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 14px}
.chipsig .row .k{width:54px;font-size:13px;font-weight:600;flex-shrink:0}
.chipsig .row .track{flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.chipsig .row .fill{height:100%;border-radius:4px}
.chipsig .row .val{width:40px;text-align:right;font-size:12.5px;font-weight:700;flex-shrink:0}

/* 產業鏈結構卡（升級版） */
.rolecard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.rolecard .rh{display:flex;align-items:center;gap:8px;cursor:pointer}
.rolecard .rh .gname{font-size:13.5px;font-weight:700;flex:1}
.rolecard .rh .gcnt{font-size:11px;color:var(--dim)}
.rolecard .rh .chev{color:var(--dim);font-size:12px;transition:transform .15s}
.rolecard .gdesc{font-size:11.5px;color:var(--dim);margin:4px 0 10px}
.ccards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer}
.ccard:hover{border-color:var(--accent)}
.ccard .l1{display:flex;align-items:baseline;gap:6px}
.ccard .nm{font-size:13.5px;font-weight:700}
.ccard .cd{font-size:11px;color:var(--dim)}
.ccard .l2{display:flex;justify-content:space-between;align-items:baseline;margin-top:2px}
.ccard .px{font-size:13px}
.ccard .roletag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;padding:2px 8px;border-radius:8px;margin-top:6px;font-weight:600}
.ccard .coupling{font-size:10px;color:var(--dim);margin-left:6px}
.ccard .dbadges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ccard .dbadge{font-size:9.5px;color:var(--sub);background:var(--bg2);border-radius:6px;padding:1px 6px}
.role-leader{background:rgba(46,204,143,.16);color:#3ddc9c}
.role-niche{background:rgba(90,162,255,.16);color:#7cb4ff}
.role-momentum{background:rgba(157,123,255,.18);color:#b79dff}
.role-pressure{background:rgba(255,150,90,.16);color:#ffab6b}
.role-follow{background:rgba(143,163,192,.15);color:var(--sub)}
.tiericon{font-size:15px}
.rolehint{font-size:11px;color:var(--dim);margin-bottom:14px}

/* ---------- AI 分析 / 評分排行 ---------- */
.aihero{text-align:center;padding:14px 10px 20px}
.aihero .trophy{font-size:30px}
.aihero h2{font-size:24px;font-weight:800;background:linear-gradient(135deg,#ffd76a,var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;margin-top:4px}
.aihero .sub{color:var(--dim);font-size:12.5px;margin-top:4px}
.scorecard{display:flex;align-items:center;gap:16px;padding:16px}
.scorecard .rankno{width:34px;text-align:center;font-size:16px;color:var(--dim);flex-shrink:0}
.scorecard .info{flex:1;min-width:0}
.scorecard .top2{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.scorecard .bignum{font-size:32px;font-weight:800;flex-shrink:0;width:70px;text-align:right}

/* ---------- 創作者升級 ---------- */
.crcard{align-items:flex-start}
.crcard .avatar{background:linear-gradient(135deg,var(--accent2),var(--accent))}
.crcard .plat{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--sub);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:3px 9px;margin-right:6px}
.crcard .nm-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <div class="brand">
      <div class="logo">📈</div><h1>台股產業地圖</h1>
      <span class="upd" id="upd"></span>
    </div>
    <nav id="nav">
      <button data-tab="daily">每日焦點</button>
      <button data-tab="topics" class="on">題材總覽</button>
      <button data-tab="overview">產業總覽</button>
      <button data-tab="map">產業地圖</button>
      <button data-tab="db">公司資料庫</button>
      <button data-tab="heat">市場熱力圖</button>
      <button data-tab="rank">評分排行</button>
      <button data-tab="creators">財經創作者</button>
    </nav>
  </div>
</header>
<main id="main"></main>
<script src="data/industries.js"></script>
<script src="data/market.js"></script>
<script src="data/companies.js"></script>
<script src="data/creators.js"></script>
<script src="data/news.js"></script>
<script src="data/history.js"></script>
<script src="data/tdcc.js"></script>
<footer>
  資料來源：臺灣證券交易所、證券櫃檯買賣中心公開資訊，每個交易日盤後自動更新。<br>
  產業鏈分類由 AI 依公開資訊整理，僅供研究參考，內容可能有誤，不構成任何投資建議。
</footer>
<script>
const S = { ind:null, mkt:null, co:null, tab:'topics', cat:'全部', theme:null, stock:null, q:'', newsDate:null };

const fmt = {
  px: v => v==null?'—':(v>=100?v.toFixed(1):v.toFixed(2)),
  pct: v => v==null?'—':(v>0?'+':'')+v.toFixed(2)+'%',
  cls: v => v==null?'flat':(v>0.001?'up':(v<-0.001?'dn':'flat')),
  vol: v => v==null?'—':(v>=1e8?(v/1e8).toFixed(1)+'億':(v/1e3).toFixed(0)+'張').replace('張','K'),
  lot: v => v==null?'—':((v/1000)>=10000?((v/1000)/10000).toFixed(1)+'萬張':(v/1000).toFixed(0)+'張'),
  num: v => v==null?'—':(Number.isInteger(v)?v.toLocaleString('zh-TW'):(+v.toFixed(2)).toLocaleString('zh-TW')),
  e: v => v==null?'—':v.toLocaleString('zh-TW')+' 億',
  rev: v => v==null?'—':(v/1e5).toFixed(1)+' 億',
  // 8 碼 YYYYMMDD -> YYYY/MM/DD；舊格式（截斷成 7 碼）只顯示年份，避免顯示錯誤的日期
  date: v => { if(!v) return '—'; const s=String(v).trim();
    if(/^\d{8}$/.test(s)) return `${s.slice(0,4)}/${s.slice(4,6)}/${s.slice(6,8)}`;
    if(/^\d{4}/.test(s)) return `${s.slice(0,4)}年`;
    return s; }
};

function stk(code){ return (S.mkt&&S.mkt.stocks[code])||{}; }
// 資料年月為民國 5 碼（YYYMM），例如 "11505" = 民國115年05月 = 2026年5月
function revMonthLabel(v){
  if(!v) return '';
  const s=String(v).trim();
  if(/^\d{5}$/.test(s)){ const y=+s.slice(0,3)+1911, m=+s.slice(3,5); return `（${y}年${m}月）`; }
  return '';
}

function themeStats(t){
  const pcts=[]; const seen=new Set();
  for(const tier of Object.values(t.chain)) for(const g of tier) for(const c of g.companies){
    if(seen.has(c.code)) continue; seen.add(c.code);
    const p=stk(c.code).pct; if(p!=null) pcts.push(p);
  }
  const avg = pcts.length? pcts.reduce((a,b)=>a+b,0)/pcts.length : null;
  return {count:seen.size, avg};
}

/* ---------- 題材總覽 ---------- */
function vTopics(){
  const themes = S.ind.themes;
  const ranked = themes.map(t=>({t,...themeStats(t)})).filter(x=>x.avg!=null).sort((a,b)=>b.avg-a.avg);
  const fmode = S.focusMode||'up';
  const top3 = fmode==='up' ? ranked.slice(0,3) : [...ranked].reverse().slice(0,3);
  const cats = ['全部', ...S.ind.categories];
  const shown = themes.filter(t=>S.cat==='全部'||t.category===S.cat);
  return `
  ${S.mkt.meta.demo?`<div class="banner">⚠️ 目前顯示<b>示範資料</b>。部署到 GitHub Pages 並啟用排程後，將自動改為每日真實盤後資料。</div>`:''}
  <div class="hero">
    <h1 class="htitle">台股產業地圖</h1>
    <div class="htag">探索台股關鍵產業鏈，深入了解供應鏈結構與個股表現</div>
  </div>
  <div class="focushd">
    <div class="ft">🔥 今日題材平均漲幅焦點</div>
    <div class="fseg"><button class="${fmode==='up'?'on':''}" onclick="setFocusMode('up')">漲</button><button class="${fmode==='dn'?'on':''}" onclick="setFocusMode('dn')">跌</button></div>
  </div>
  <div class="focus">${top3.map((x,i)=>`
    <div class="fc" style="border-top-color:${x.avg>0?'var(--up)':'var(--dn)'}" onclick="go('map','${x.t.id}')">
      <div class="rank">#${i+1}　${x.count} 家</div>
      <div class="pct ${fmt.cls(x.avg)}">${fmt.pct(x.avg)}</div>
      <div class="nm">${x.t.name}</div>
    </div>`).join('')}
  </div>
  <div class="catbar">${cats.map(c=>`<button class="${c===S.cat?'on':''}" onclick="setCat('${c}')">${c}</button>`).join('')}</div>
  <div class="cards">${shown.map(t=>{
    const st=themeStats(t);
    return `<div class="tcard" onclick="go('map','${t.id}')">
      <div class="thead">
        <div class="top"><span class="icowrap">${t.icon}</span><span class="cnt">${st.count} 家公司</span></div>
      </div>
      <div class="body">
        <h3 style="margin-top:8px">${t.name}</h3><p>${t.desc}</p>
        <div class="updated">
          <span class="avg ${fmt.cls(st.avg)}">今日平均 ${fmt.pct(st.avg)}</span>
          <span>探索產業地圖 →</span>
        </div>
      </div>
    </div>`;}).join('')}
  </div>`;
}
function setFocusMode(m){S.focusMode=m;render();}

/* ---------- 產業地圖：共用資料工具 ---------- */
function themeCompanies(t){
  const out=[]; const seen=new Set();
  for(const [tier,groups] of Object.entries(t.chain)) for(const g of groups) for(const c of g.companies){
    if(seen.has(c.code)) continue; seen.add(c.code);
    out.push({...c, tier, group:g.group});
  }
  return out;
}
const ROLE_RULES = [
  {key:'leader', label:'產業龍頭', icon:'🟢', cls:'role-leader'},
  {key:'niche', label:'利基專精', icon:'🔵', cls:'role-niche'},
  {key:'momentum', label:'動能發動', icon:'🟣', cls:'role-momentum'},
  {key:'pressure', label:'承壓整理', icon:'🟠', cls:'role-pressure'},
  {key:'follow', label:'跟隨主流', icon:'⚪', cls:'role-follow'}
];
function roleOf(key){ return ROLE_RULES.find(r=>r.key===key)||ROLE_RULES[4]; }
function computeRole(code, groupCodes){
  const s=stk(code), c=(S.co&&S.co[code])||{};
  const mine = c.mktcap_e;
  const leaderCode = [...groupCodes].sort((a,b)=>{
    const ca=(S.co&&S.co[a]&&S.co[a].mktcap_e)||0, cb=(S.co&&S.co[b]&&S.co[b].mktcap_e)||0;
    return cb-ca;
  })[0];
  if(code===leaderCode) return 'leader';
  if(mine!=null && mine<30) return 'niche';
  if(s.pct!=null && s.pct<=-3) return 'pressure';
  if(s.pct!=null && s.pct>=3) return 'momentum';
  return 'follow';
}
function computeBadges(code){
  const s=stk(code), c=(S.co&&S.co[code])||{};
  const b=[];
  if(s.foreign_net!=null && s.foreign_net>0) b.push('外資買超');
  if(s.trust_net!=null && s.trust_net>0) b.push('投信買超');
  if(c.rev_yoy!=null && c.rev_yoy>=15) b.push('營收年增');
  if(s.yield!=null && s.yield>=4) b.push('殖利率佳');
  return b;
}
function themeKeyMetrics(t){
  const comps = themeCompanies(t);
  let pctSum=0,pctN=0,fBuy=0,fN=0,tBuy=0,tN=0;
  for(const c of comps){
    const s=stk(c.code);
    if(s.pct!=null){pctSum+=s.pct;pctN++;}
    if(s.foreign_net!=null){fN++; if(s.foreign_net>0)fBuy++;}
    if(s.trust_net!=null){tN++; if(s.trust_net>0)tBuy++;}
  }
  return {
    count: comps.length,
    avgPct: pctN? pctSum/pctN : null,
    foreignBuy: fN? `${fBuy}/${fN}` : '—',
    trustBuy: tN? `${tBuy}/${tN}` : '—'
  };
}
function chipSignalScore(comps, field){
  let buy=0,total=0;
  for(const c of comps){ const v=stk(c.code)[field]; if(v!=null){total++; if(v>0)buy++;} }
  return total? Math.round(buy/total*10) : null;
}
function tdccScore(comps){
  const t=window.DATA_TDCC; const dates=t?Object.keys(t).sort():[];
  if(!t||dates.length<2) return null;
  const [p,c]=[t[dates[dates.length-2]],t[dates[dates.length-1]]];
  let up=0,total=0;
  for(const co of comps){ if(p[co.code]!=null && c[co.code]!=null){ total++; if(c[co.code]>p[co.code]) up++; } }
  return total? Math.round(up/total*10) : null;
}

/* ---------- 產業地圖：路由（總覽 / 產業鏈） ---------- */
function vMap(){
  if(!S.theme) S.theme = S.ind.themes[0].id;
  const t = S.ind.themes.find(x=>x.id===S.theme) || S.ind.themes[0];
  const sub = S.mapSub||'overview';
  return `
  <h2 class="pagetitle">產業地圖</h2>
  <div class="catbar">${S.ind.themes.map(x=>`<button class="${x.id===S.theme?'on':''}" onclick="go('map','${x.id}')">${x.icon} ${x.name}</button>`).join('')}</div>
  <div class="tbanner">
    <div class="row1"><span class="bico">${t.icon}</span><h2>${t.name}</h2></div>
    <div class="desc">${t.desc}</div>
    <div class="stats"><span class="stat">${t.category}</span><span class="stat">${themeKeyMetrics(t).count} 家公司</span></div>
  </div>
  <div class="subtabs">
    <button class="${sub==='overview'?'on':''}" onclick="setMapSub('overview')">📊 總覽</button>
    <button class="${sub==='structure'?'on':''}" onclick="setMapSub('structure')">🔗 產業鏈</button>
  </div>
  ${sub==='structure' ? vMapStructure(t) : vMapOverview(t)}`;
}
function setMapSub(m){S.mapSub=m;render();}

/* ---------- 產業地圖：總覽子頁 ---------- */
function vMapOverview(t){
  const km = themeKeyMetrics(t);
  const comps = themeCompanies(t);
  const mode = S.themeTmMode||0;
  const items = comps.map(c=>{
    const p = mode===0 ? stk(c.code).pct : histChange(c.code, mode);
    return {id:c.code, name:c.name, pct:p, size:Math.max(Math.abs(p??0),0.3)+0.15};
  }).filter(x=>x.pct!=null).sort((a,b)=>b.size-a.size);
  setTimeout(()=>{
    const el=document.getElementById('tm-theme'); if(!el)return;
    const W=el.clientWidth,H=el.clientHeight,out=[];
    squarify(items,0,0,W,H,out);
    el.innerHTML=out.map(c=>{
      const small=c.w<80||c.h<40;
      return `<div class="tmc" style="left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px;background:${heatColor(c.pct)}"
        onclick="go('db','${c.id}')" title="${c.name} ${fmt.pct(c.pct)}">
        <div class="tn" style="${small?'font-size:10px':''}">${c.name}</div>
        ${c.h>30?`<div class="tp">${fmt.pct(c.pct)}</div>`:''}</div>`;
    }).join('') || `<div class="empty" style="padding-top:40px">尚無足夠資料繪製熱力圖</div>`;
  },0);
  const fBar = chipSignalScore(comps,'foreign_net');
  const tBar = chipSignalScore(comps,'trust_net');
  const hBar = tdccScore(comps);
  const sigRow = (label,v)=>{
    if(v==null) return `<div class="row"><span class="k">${label}</span><span style="font-size:11.5px;color:var(--dim)">資料累積中</span></div>`;
    const col = v>=6?'var(--up)':(v<=4?'var(--dn)':'#6c7fa3');
    return `<div class="row"><span class="k">${label}</span><span class="track"><span class="fill" style="width:${v*10}%;background:${col}"></span></span><span class="val">${v}/10</span></div>`;
  };
  return `
  <div class="metgrid">
    <div class="metcard"><div class="mk">本題材公司數</div><div class="mv">${km.count} 家</div></div>
    <div class="metcard"><div class="mk">今日平均漲跌</div><div class="mv ${fmt.cls(km.avgPct)}">${fmt.pct(km.avgPct)}</div></div>
    <div class="metcard"><div class="mk">外資買超家數</div><div class="mv">${km.foreignBuy}</div></div>
    <div class="metcard"><div class="mk">投信買超家數</div><div class="mv">${km.trustBuy}</div></div>
  </div>
  <div class="sechd"><span class="bar"></span><h4>產業漲跌熱力圖</h4><span class="sub">區塊大小＝漲跌幅度，可切換觀察區間</span>
    <span class="segbar"><button class="${mode===0?'on':''}" onclick="setThemeTm(0)">單日</button><button class="${mode===5?'on':''}" onclick="setThemeTm(5)">單週</button><button class="${mode===20?'on':''}" onclick="setThemeTm(20)">單月</button></span>
  </div>
  <div class="panel"><div id="tm-theme"></div></div>
  <div class="sechd"><span class="bar"></span><h4>籌碼訊號</h4><span class="sub">依今日買賣超家數比例估算，僅供參考</span></div>
  <div class="chipsig">
    ${sigRow('外資', fBar)}
    ${sigRow('投信', tBar)}
    ${sigRow('大戶', hBar)}
  </div>`;
}
function setThemeTm(m){S.themeTmMode=m;render();}

/* ---------- 產業地圖：產業鏈子頁 ---------- */
function vMapStructure(t){
  const tiers = ['上游','中游','下游'].filter(k=>t.chain[k]);
  const badge = {'上游':'b-up','中游':'b-mid','下游':'b-dn'};
  const ticon = {'上游':'⛏️','中游':'⚙️','下游':'🏬'};
  return `
  <div class="rolehint">角色標籤依市值排名與當日動能簡易分類，資料徽章依買賣超與營收年增計算，僅供研究參考。</div>

function newsSection(){
  const N=window.DATA_NEWS; if(!N) return '';

  const dates=Object.keys(days).sort().reverse();
  let cur=S.newsDate;
  if(!cur||!dates.includes(cur)) cur=dates[0];
  const pill=d=>{const p=d.split('-');return p[1]+'/'+p[2];};
  const mdd=d=>{const p=d.split('-');return (+p[1])+'月'+(+p[2])+'日';};
  const datebar = dates.length?`<div class="ndates">
    ${dates.slice(0,7).map((d,i)=>`<button class="${d===cur?'on':''}" onclick="setNewsDate('${d}')">${i===0?'今日':pill(d)}</button>`).join('')}
  </div>`:'';
  const list=days[cur]||[];
  const free=(N.premium&&N.premium.free!=null)?N.premium.free:list.length;
  const cards=list.map((it,i)=>{
    const locked = N.premium && i>=free;
    const tags=(it.topics||[]).map(t=>t.id
      ?`<span class="ntag" onclick="event.stopPropagation();go('map','${t.id}')">${t.name}</span>`
      :`<span class="ntag">${t.name}</span>`).join('');
    const inner=`<div class="nc1"><span class="src">${it.source||''}</span><span class="nd">${mdd(cur)}</span></div>
      <h4>${it.title||''}</h4><p>${it.summary||''}</p>

    if(locked){
      const p=N.premium;
      return `<div class="ncard lock">${inner}
        <div class="premium"><div class="plock">🔒</div>
          <div class="pt">${p.title||'Premium 限定'}</div>
          <div class="pd">${p.desc||''}</div>
          <button class="pcta" onclick="premiumCTA()">${p.cta||'立即升級'}</button></div>
      </div>`;
    }
    return `<div class="ncard">${inner}</div>`;
  }).join('');
  return `<div class="newsblock">
    <div class="newshd"><div class="nico">🗞️</div>
      <div class="htxt"><div class="t">產業焦點導航 <span class="b">精選回顧</span></div>
        <div class="s">快速掌握每日核心題材與連動關係・排定更新：每日 12:00（台灣時間）</div></div>
      ${datebar}
    </div>
    <div class="newsrow">${cards||'<div class="empty" style="padding:34px 0;flex:1">這天還沒有新聞，可在 data/news.js 編輯。</div>'}</div>
    ${N.meta&&N.meta.note?`<div class="newsnote">＊ ${N.meta.note}</div>`:''}
  </div>`;
}

  const N=window.DATA_NEWS||{}; const url=N.premium&&N.premium.url;
  if(url){window.open(url,'_blank','noopener');return;}
  const el=document.querySelector('.newsnote');
  if(el){el.textContent='＊ 尚未設定升級連結：在 data/news.js 的 premium.url 填入你的贊助/訂閱網址即可啟用。';el.style.color='var(--accent)';}

/* --- 本週強勢股（由每日收盤歷史計算） --- */
function histChange(code,back){
  const h=window.DATA_HISTORY; if(!h)return null;
  const dates=Object.keys(h).sort();
  if(dates.length<back+1)return null;
  const last=h[dates[dates.length-1]][code], prev=h[dates[dates.length-1-back]][code];
  if(last==null||prev==null||!prev)return null;
  return (last/prev-1)*100;
}

/* ---------- 市場熱力圖 ---------- */
const HEAT_UP=['#5c2a34','#8c3341','#c03d4d','#f24a59'], HEAT_DN=['#1e4a3c','#256a52','#2d8a68','#37ad84'], HEAT_FLAT='#2a3550';
function heatColor(p){
  if(p==null)return HEAT_FLAT;
  const a=Math.abs(p), arm=p>0?HEAT_UP:HEAT_DN;
  if(a<0.15)return HEAT_FLAT;
  if(a<1)return arm[0]; if(a<2.5)return arm[1]; if(a<5)return arm[2]; return arm[3];
}
function squarify(items,x,y,w,h,out){
  if(!items.length)return;
  if(items.length===1){out.push({...items[0],x,y,w,h});return;}
  const total=items.reduce((s,i)=>s+i.size,0);
  let row=[],rest=[...items],best=Infinity;
  const shortSide=Math.min(w,h);
  while(rest.length){
    const cand=[...row,rest[0]];
    const s=cand.reduce((a,b)=>a+b.size,0);
    const areaScale=(w*h)/total;
    const rowArea=s*areaScale;
    const thick=rowArea/shortSide;
    const worst=Math.max(...cand.map(i=>{
      const len=i.size*areaScale/thick;
      return Math.max(thick/len,len/thick);
    }));
    if(worst<=best){row=cand;rest.shift();best=worst;}else break;
  }
  const s=row.reduce((a,b)=>a+b.size,0);
  const areaScale=(w*h)/total;
  const thick=s*areaScale/shortSide;
  let off=0;
  for(const i of row){
    const len=i.size*areaScale/thick;
    if(w<=h)out.push({...i,x:x+off,y,w:len,h:thick});
    else out.push({...i,x,y:y+off,w:thick,h:len});
    off+=len;
  }
  if(w<=h)squarify(rest,x,y+thick,w,h-thick,out);
  else squarify(rest,x+thick,y,w-thick,h,out);
}
function vHeat(){
  const items=S.ind.themes.map(t=>{const st=themeStats(t);return {id:t.id,name:t.name,pct:st.avg,size:Math.max(Math.abs(st.avg??0),0.35)+0.15};})
    .filter(x=>x.pct!=null).sort((a,b)=>b.size-a.size);
  setTimeout(()=>{
    const el=document.getElementById('tm'); if(!el)return;
    const W=el.clientWidth,H=el.clientHeight,out=[];
    squarify(items,0,0,W,H,out);
    el.innerHTML=out.map(c=>{
      const small=c.w<86||c.h<44;
      return `<div class="tmc" style="left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px;background:${heatColor(c.pct)}"
        onclick="go('map','${c.id}')" title="${c.name} ${fmt.pct(c.pct)}">
        <div class="tn" style="${small?'font-size:10px':''}">${c.name}</div>
        ${c.h>34?`<div class="tp">${fmt.pct(c.pct)}</div>`:''}</div>`;
    }).join('');
  },0);
  return `
  <h2 class="pagetitle">市場熱力圖</h2>
  <div class="pagesub">區塊大小＝產業平均漲跌幅度（絕對值），顏色＝漲跌方向與強度。點擊區塊進入該產業地圖。</div>
  <div class="panel"><div id="tm"></div>
  <div class="legend">跌超5% <i style="background:${HEAT_DN[3]}"></i><i style="background:${HEAT_DN[2]}"></i><i style="background:${HEAT_DN[1]}"></i><i style="background:${HEAT_DN[0]}"></i><i style="background:${HEAT_FLAT}"></i><i style="background:${HEAT_UP[0]}"></i><i style="background:${HEAT_UP[1]}"></i><i style="background:${HEAT_UP[2]}"></i><i style="background:${HEAT_UP[3]}"></i> 漲超5%</div>
  </div>
  <div class="pagesub" style="margin-top:8px">另有表格版：<a href="javascript:void(0)" onclick="go('overview')">產業總覽</a>（相同數據、可排序）。</div>`;
}

/* ---------- 綜合評分 ---------- */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function scoreStock(code){
  const s=stk(code); if(s.pct==null)return null;
  const c=(S.co&&S.co[code])||{};
  const mom=clamp(50+s.pct*5.5,2,98);                                  // 動能：當日漲跌
  const chips=clamp(50+((s.inst_net??0)/Math.max(s.volume||1,1))*400,2,98); // 籌碼：法人買超佔量
  let fund=50;
  if(c.rev_yoy!=null)fund+=clamp(c.rev_yoy*0.6,-30,38);
  if(s.pe!=null)fund+=s.pe<12?6:(s.pe>70?-8:0);
  fund=clamp(fund,2,98);
  const ts=themesOf(code); let th=50;
  if(ts.length){const avg=ts.reduce((a,t)=>a+(themeStats(t).avg??0),0)/ts.length; th=clamp(50+avg*7,2,98);}
  const total=0.32*mom+0.28*chips+0.24*fund+0.16*th;
  return {mom:Math.round(mom),chips:Math.round(chips),fund:Math.round(fund),theme:Math.round(th),total:Math.round(total*10)/10};
}
function sbarHtml(k,v){
  const col=v>=60?'var(--up)':(v<=40?'var(--dn)':'#6c7fa3');
  return `<div class="sbar"><span class="k">${k}</span><span class="track"><span class="fill" style="width:${v}%;background:${col}"></span></span><span class="val">${v}</span></div>`;
}
function vRank(){
  const mode=S.rankMode||'strong';
  const scored=[];
  const seen=new Set();
  for(const t of S.ind.themes) for(const tier of Object.values(t.chain)) for(const g of tier) for(const c of g.companies){
    if(seen.has(c.code))continue; seen.add(c.code);
    const sc=scoreStock(c.code); if(sc)scored.push({code:c.code,sc});
  }
  scored.sort((a,b)=>mode==='strong'?b.sc.total-a.sc.total:a.sc.total-b.sc.total);
  const top=scored.slice(0,10);
  const medals=['🥇','🥈','🥉'];
  return `
  <div class="aihero">
    <div class="trophy">🏆</div>
    <h2>AI 評分排行榜</h2>
    <div class="sub">規則式綜合評分（動能／籌碼／基本面／題材，各 0–100），依盤後資料自動計算・即時更新</div>
  </div>
  <div class="segbar" style="justify-content:center;display:flex">
    <button class="${mode==='strong'?'on':''}" onclick="setRank('strong')">📈 強勢排行</button>
    <button class="${mode==='weak'?'on':''}" onclick="setRank('weak')">📉 弱勢排行</button>
  </div>
  ${top.map((x,i)=>{const s=stk(x.code);
    return `<div class="scorecard" onclick="go('db','${x.code}')">
    <div class="rankno">${medals[i]||`#${i+1}`}</div>
    <div class="info">
      <div class="top2">
        <span class="nm">${s.name}</span><span class="cd" style="color:var(--dim);font-size:12px">${x.code}</span>
        <span class="${fmt.cls(s.pct)}" style="font-size:13px">${fmt.px(s.close)}　${fmt.pct(s.pct)}</span>
      </div>
      <div class="sbars">${sbarHtml('動能',x.sc.mom)}${sbarHtml('籌碼',x.sc.chips)}${sbarHtml('基本面',x.sc.fund)}${sbarHtml('題材',x.sc.theme)}</div>
    </div>
    <div class="bignum ${x.sc.total>=60?'up':(x.sc.total<=40?'dn':'')}">${x.sc.total}</div>
  </div>`;}).join('')}
  <div class="pagesub">評分範圍：已納入產業地圖的 ${scored.length} 檔標的。</div>`;
}
function setRank(m){S.rankMode=m;render();}

/* ---------- 路由 ---------- */
function render(){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===S.tab));
  const m=document.getElementById('main');
  const views={daily:vDaily,topics:vTopics,overview:vOverview,map:vMap,db:vDB,heat:vHeat,rank:vRank,creators:vCreators};
  m.innerHTML = (views[S.tab]||vTopics)();
  const meta=S.mkt.meta;
  document.getElementById('upd').textContent = meta.demo?'示範資料':`資料日期 ${meta.trade_date}`;
  const p=new URLSearchParams();
  p.set('tab',S.tab);
  if(S.tab==='map'&&S.theme)p.set('topic',S.theme);
  if(S.tab==='db'&&S.stock)p.set('c',S.stock);
  history.replaceState(null,'','?'+p.toString());
}
function go(tab,arg){
  S.tab=tab;
  if(tab==='map'&&arg)S.theme=arg;
  if(tab==='db'&&arg)S.stock=arg;
  render(); window.scrollTo({top:0});
}
function setCat(c){S.cat=c;render();}
let qT=null;
function setQ(v){S.q=v;clearTimeout(qT);qT=setTimeout(()=>{const el=document.querySelector('.list input');const pos=el&&el.selectionStart;render();const el2=document.querySelector('.list input');if(el2){el2.focus();el2.setSelectionRange(pos,pos);}},250);}
document.getElementById('nav').addEventListener('click',e=>{if(e.target.dataset.tab)go(e.target.dataset.tab);});

let bootTried=false;
function boot(){
  S.ind=window.DATA_INDUSTRIES; S.mkt=window.DATA_MARKET; S.co=window.DATA_COMPANIES||{};
  if(!S.ind||!S.mkt){
    if(!bootTried){
      // 備援：若 data/ 底下找不到，改從 index.html 同一層載入
      bootTried=true;
      const files=[['DATA_INDUSTRIES','industries.js'],['DATA_MARKET','market.js'],['DATA_COMPANIES','companies.js'],['DATA_CREATORS','creators.js'],['DATA_NEWS','news.js'],['DATA_HISTORY','history.js'],['DATA_TDCC','tdcc.js']];
      let left=files.length;
      for(const [v,f] of files){
        if(window[v]){if(--left===0)boot();continue;}
        const sc=document.createElement('script');
        sc.src=f; sc.onload=sc.onerror=()=>{if(--left===0)boot();};
        document.body.appendChild(sc);
      }
      return;
    }
    document.getElementById('main').innerHTML=`<div class="empty">資料檔載入失敗。<br><br>請確認資料夾結構如下（大小寫需一致）：<br>
      <pre style="text-align:left;display:inline-block;margin-top:10px;color:var(--sub);font-size:12.5px;line-height:1.7">twstockmap\\
├─ index.html
└─ data\\
    ├─ industries.js
    ├─ market.js
    ├─ companies.js
    └─ creators.js</pre><br>
      常見原因：下載時檔名被瀏覽器改成「market (1).js」→ 請改回原名；<br>或資料檔忘了放進 data 資料夾（放在 index.html 同層其實也可以，本頁會自動嘗試）。</div>`;
    return;
  }
  const p=new URLSearchParams(location.search);
  if(p.get('tab'))S.tab=p.get('tab');
  if(p.get('topic'))S.theme=p.get('topic');
  if(p.get('c')){S.stock=p.get('c');S.tab='db';}
  render();
}
boot();
if('serviceWorker' in navigator && location.protocol.startsWith('http')) navigator.serviceWorker.register('sw.js').catch(()=>{});
